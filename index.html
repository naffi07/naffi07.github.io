<!DOCTYPE html>
<html>
<head>
    <title>Mon Site avec Connexion</title>
</head>
<body>
    <h1>Bienvenue sur mon site</h1>

    <h2>Inscription</h2>
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Mot de passe">
    <button onclick="signUp()">S'inscrire</button>

    <h2>Connexion</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Mot de passe">
    <button onclick="signIn()">Se connecter</button>

    <p id="message"></p>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClSAS6tiArvFbzg_pMEwQAy2_UBtN-wx4",
            authDomain: "mon-site-pub.firebaseapp.com",
            projectId: "mon-site-pub",
            storageBucket: "mon-site-pub.firebasestorage.app",
            messagingSenderId: "201371601448",
            appId: "1:201371601448:web:9b3274c7c15a4a8bd2c31d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function signUp() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('message').innerText = '✅ Inscription réussie !';
                })
                .catch((error) => {
                    document.getElementById('message').innerText = '❌ ' + error.message;
                });
        }

        function signIn() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('message').innerText = '✅ Connecté !';
                })
                .catch((error) => {
                    document.getElementById('message').innerText = '❌ ' + error.message;
                });
        }
    </script>
</body>
</html>
